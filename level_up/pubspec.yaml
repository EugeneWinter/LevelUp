name: level_up
description: Платформа гражданского мониторинга городской среды

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  image_picker: ^1.0.7
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.6.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  fl_chart: ^0.68.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/